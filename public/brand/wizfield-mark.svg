<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WIZFIELD connected W mark</title>
  <desc id="desc">A connected W-shaped intelligence graph with cyan-to-violet gradient nodes.</desc>
  <defs>
    <linearGradient id="wfMarkGradient" x1="18" y1="22" x2="110" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00F0FF"/>
      <stop offset="0.48" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#7000FF"/>
    </linearGradient>
    <filter id="wfMarkGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.28 0 0 0 0 1 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="#F8FAFC"/>
  <path d="M24 32L42 94L64 58L86 94L104 32" stroke="url(#wfMarkGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#wfMarkGlow)"/>
  <path d="M42 94L51 70L64 58L76 70L86 94" stroke="url(#wfMarkGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.72"/>
  <g fill="#F8FAFC" stroke="url(#wfMarkGradient)" stroke-width="5" filter="url(#wfMarkGlow)">
    <circle cx="24" cy="32" r="9"/>
    <circle cx="42" cy="94" r="9"/>
    <circle cx="64" cy="58" r="7"/>
    <circle cx="86" cy="94" r="9"/>
    <circle cx="104" cy="32" r="9"/>
  </g>
  <g fill="#F8FAFC" stroke="url(#wfMarkGradient)" stroke-width="3" opacity="0.9">
    <circle cx="51" cy="70" r="4"/>
    <circle cx="76" cy="70" r="4"/>
  </g>
</svg>
