<svg width="760" height="180" viewBox="0 0 760 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WIZFIELD horizontal logo</title>
  <desc id="desc">WIZFIELD wordmark paired with a connected W-shaped intelligence graph symbol.</desc>
  <defs>
    <linearGradient id="wfLogoGradient" x1="40" y1="30" x2="180" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00F0FF"/>
      <stop offset="0.48" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#7000FF"/>
    </linearGradient>
    <linearGradient id="wfWordGradient" x1="230" y1="72" x2="720" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.48" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#7000FF"/>
    </linearGradient>
    <filter id="wfLogoGlow" x="-20%" y="-35%" width="140%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.11 0 0 0 0 0.22 0 0 0 0 1 0 0 0 0.35 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  <g filter="url(#wfLogoGlow)">
    <path d="M44 46L70 132L100 82L130 132L156 46" stroke="url(#wfLogoGradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M70 132L84 98L100 82L116 98L130 132" stroke="url(#wfLogoGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>
    <g fill="#F8FAFC" stroke="url(#wfLogoGradient)" stroke-width="6">
      <circle cx="44" cy="46" r="11"/>
      <circle cx="70" cy="132" r="11"/>
      <circle cx="100" cy="82" r="8"/>
      <circle cx="130" cy="132" r="11"/>
      <circle cx="156" cy="46" r="11"/>
    </g>
    <g fill="#F8FAFC" stroke="url(#wfLogoGradient)" stroke-width="4" opacity="0.9">
      <circle cx="84" cy="98" r="5"/>
      <circle cx="116" cy="98" r="5"/>
    </g>
  </g>
  <text x="220" y="113" fill="url(#wfWordGradient)" font-family="Inter, Avenir Next, Montserrat, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="13">WIZFIELD</text>
  <path d="M222 132H706" stroke="url(#wfWordGradient)" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
</svg>
